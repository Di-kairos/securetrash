name: release
# На push тега vX.Y.Z: собирает SHA256SUMS и публикует Release с ассетами,
# чтобы install.sh/install.ps1 могли тянуть бинарь+сумму с релизного тега
# (releases/latest/download/...) и проверять целостность до установки.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage release assets (flat basenames)
        run: |
          mkdir -p dist
          cp securetrash install.sh dist/
          cp windows/securetrash.ps1 windows/install.ps1 dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum securetrash install.sh securetrash.ps1 install.ps1 > SHA256SUMS

      - name: Sign SHA256SUMS (if a signing key is configured)
        working-directory: dist
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          # Подпись — поверх целостности (аутентичность). Ключ опционален: пока секрет
          # RELEASE_SIGNING_KEY не задан, релиз остаётся checksum-verified, без .sig
          # (install.sh это умеет пережить). Ключ выделенный ed25519, без passphrase
          # (защита — доступ к GH Secrets); namespace 'file' как у ssh-keygen -Y verify.
          if [ -z "${SIGNING_KEY:-}" ]; then
            echo "RELEASE_SIGNING_KEY не задан — прерываю выпуск (подпись обязательна)." >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "$SIGNING_KEY" > signing_key
          ssh-keygen -Y sign -f signing_key -n file SHA256SUMS
          rm -f signing_key
          echo "Подписал SHA256SUMS → SHA256SUMS.sig"

      - name: Create GitHub Release with verified assets
        # Имя тега берём из защищённой env-переменной, не из inline-выражения.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # .sig добавляем только если подпись была создана (ключ может быть ещё не выдан).
          assets=(dist/securetrash dist/install.sh dist/securetrash.ps1 dist/install.ps1 dist/SHA256SUMS)
          [ -f dist/SHA256SUMS.sig ] && assets+=(dist/SHA256SUMS.sig)
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            "${assets[@]}"
